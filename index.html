<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CPB Tool</title>

<style>
body{font-family:-apple-system;background:#f2f2f7;padding:16px;}

.tabs{display:flex;gap:8px;margin-bottom:12px;}
.tab{flex:1;padding:10px;text-align:center;background:#ddd;border-radius:10px;}
.tab.active{background:#007aff;color:white;}

.section{display:none;}
.section.active{display:block;}

input{
width:60px;
text-align:center;
font-size:18px;
border:none;
background:#fafafa;
border-radius:8px;
padding:6px;
}

/* CDI グリッド */
.cdi-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
text-align:center;
margin-bottom:20px;
}

.selected{
outline:3px solid #007aff;
}

/* ±操作 */
.control{
display:flex;
justify-content:center;
gap:40px;
margin-top:10px;
}

.ctrl-btn{
font-size:24px;
padding:10px 20px;
border-radius:10px;
background:#ddd;
}

.result{
font-size:18px;
text-align:center;
margin-top:10px;
font-weight:bold;
}
</style>
</head>

<body>

<h2>CPB Tool</h2>

<div class="tabs">
<div class="tab active" onclick="showTab('basic',event)">Baseline</div>
<div class="tab" onclick="showTab('clinical',event)">Perfusion</div>
<div class="tab" onclick="showTab('cp',event)">CP</div>
</div>

<!-- ===== Baseline（そのまま） ===== -->
<div id="basic" class="section active">
<input id="height" placeholder="身長" inputmode="decimal" oninput="calcAll()">
<input id="weight" placeholder="体重" inputmode="decimal" oninput="calcAll()">
<input id="hb" placeholder="Hb" inputmode="decimal" oninput="calcAll()">
<input id="alb" placeholder="Alb" inputmode="decimal" oninput="calcAll()">
<input id="prime" placeholder="Prime" inputmode="decimal" oninput="calcAll()">

<div id="bsa" class="result">BSA : --</div>
<div id="hbDil" class="result">予想Hb : --</div>
<div id="dilution" class="result">希釈率 : --</div>
<div id="albDil" class="result">予想Alb : --</div>
</div>

<!-- ===== Perfusion（新UI） ===== -->
<div id="clinical" class="section">

<h3 style="text-align:center;">CDI Data</h3>

<div class="cdi-grid">

<div>
Hb<br>
<input id="hb_now" value="7.5" onclick="selectInput(this)" oninput="calcAll()">
</div>

<div>
SBE<br>
<input id="sbe_now" value="-5" onclick="selectInput(this)" oninput="calcAll()">
</div>

<div>
SaO2<br>
<input id="sao2_now" value="100" onclick="selectInput(this)" oninput="calcAll()">
</div>

<div>
CI<br>
<input id="ci_now" value="2.4" onclick="selectInput(this)" oninput="calcAll()">
</div>

</div>

<!-- ±操作 -->
<div class="control">
<button class="ctrl-btn" id="minus">－</button>
<button class="ctrl-btn" id="plus">＋</button>
</div>

<hr>

<h3 style="text-align:center;">Results</h3>

<div id="flow" class="result">Flow : --</div>
<div id="do2" class="result">DO2 : --</div>
<div id="do2i" class="result">DO2i : --</div>

<hr>

<h3 style="text-align:center;">Adjustments</h3>

<div style="text-align:center;">
目標Hb
<button onclick="adjust('target_hb',-0.5)">-0.5</button>
<input id="target_hb" value="9" oninput="calcAll()">
<button onclick="adjust('target_hb',0.5)">+0.5</button>
必要RBC <span id="rbc">--</span>
</div>

<div style="text-align:center;">
目標SBE
<button onclick="adjust('target_sbe',-1)">-1</button>
<input id="target_sbe" value="0" oninput="calcAll()">
<button onclick="adjust('target_sbe',1)">+1</button>
必要メイロン <span id="meylon">--</span>
</div>

</div>

<script>

let selected=null
let interval=null

function selectInput(el){
document.querySelectorAll("input").forEach(i=>i.classList.remove("selected"))
el.classList.add("selected")
selected=el
}

// 長押し処理
function startAdjust(delta){
if(!selected) return
interval=setInterval(()=>{
let v=parseFloat(selected.value)||0
v+=delta
selected.value=v.toFixed(1)
calcAll()
},100)
}

function stopAdjust(){
clearInterval(interval)
}

// ボタン設定
document.getElementById("plus").onmousedown=()=>startAdjust(0.1)
document.getElementById("minus").onmousedown=()=>startAdjust(-0.1)

document.onmouseup=stopAdjust
document.onmouseleave=stopAdjust

// タブ
function showTab(id,e){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
e.currentTarget.classList.add("active")
}

// 計算（そのまま）
function calcAll(){
calcPre()
calcClinical()
}

// 基本
function calcPre(){
let h=parseFloat(height.value)||0
let w=parseFloat(weight.value)||0
let hb=parseFloat(document.getElementById("hb").value)||0
let alb=parseFloat(document.getElementById("alb").value)||0
let prime=parseFloat(document.getElementById("prime").value)||0

if(h&&w){
let b=Math.sqrt((h*w)/3600)
bsa.innerHTML="BSA : "+b.toFixed(2)

let blood=w*70
if(hb) hbDil.innerHTML="予想Hb : "+(hb*blood/(blood+prime)).toFixed(2)
if(alb) albDil.innerHTML="予想Alb : "+(alb*blood/(blood+prime)).toFixed(2)

dilution.innerHTML="希釈率 : "+((blood+prime)/blood).toFixed(2)
}
}

// 臨床
function calcClinical(){
let h=parseFloat(height.value)||0
let w=parseFloat(weight.value)||0
let hb=parseFloat(hb_now.value)||0
let sao2=(parseFloat(sao2_now.value)||0)/100
let ci=parseFloat(ci_now.value)||0
let sbe=parseFloat(sbe_now.value)||0

let targetHb=parseFloat(target_hb.value)||0
let targetSBE=parseFloat(target_sbe.value)||0

if(h&&w){
let b=Math.sqrt((h*w)/3600)
let flow=ci*b
flow && (flowEl.innerHTML="Flow : "+flow.toFixed(2))

let do2=1.34*hb*sao2*flow*10/b
document.getElementById("do2").innerHTML="DO2 : "+do2.toFixed(0)
document.getElementById("do2i").innerHTML="DO2i : "+(do2/b).toFixed(0)

let r=targetHb-hb
if(r<0)r=0
document.getElementById("rbc").innerText=r.toFixed(1)

let m=0.36*w*(targetSBE-sbe)
if(m<0)m=0
document.getElementById("meylon").innerText=m.toFixed(0)
}
}

// adjust
function adjust(id,delta){
let el=document.getElementById(id)
let v=parseFloat(el.value)||0
v+=delta
el.value=v.toFixed(1)
calcAll()
}

</script>

</body>
</html>
