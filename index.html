<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPB Tool</title>

<style>
body{font-family:-apple-system;background:#f2f2f7;padding:16px;}

.tabs{display:flex;gap:8px;margin-bottom:12px;}
.tab{flex:1;padding:10px;text-align:center;background:#ddd;border-radius:10px;}
.tab.active{background:#007aff;color:white;}

.section{display:none;}
.section.active{display:block;}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:10px;
}

.field{
display:flex;
justify-content:space-between;
align-items:center;
background:#fafafa;
padding:8px;
border-radius:10px;
}

input{
width:65px;
text-align:center;
font-size:16px;
border:none;
background:transparent;
}

/* CDI */
.cdi{text-align:center;margin-bottom:15px;}
.cdi input{background:#fafafa;border-radius:8px;padding:6px;}
.cdi input.selected{outline:3px solid #007aff !important;}

.control{
display:flex;
justify-content:center;
gap:40px;
margin:15px 0;
}

.ctrl{
font-size:24px;
padding:10px 20px;
background:#ddd;
border-radius:10px;
}

.result{
text-align:center;
font-size:18px;
margin:5px;
font-weight:bold;
}
</style>
</head>

<body>

<h2>CPB Tool</h2>

<div class="tabs">
<div class="tab active" onclick="showTab('basic',event)">Baseline</div>
<div class="tab" onclick="showTab('clinical',event)">Perfusion</div>
<div class="tab" onclick="showTab('cp',event)">CP</div>
</div>

<!-- Baseline -->
<div id="basic" class="section active">
<div class="row">
<div class="field">身長<input id="height" inputmode="decimal" oninput="calcAll()"></div>
<div class="field">体重<input id="weight" inputmode="decimal" oninput="calcAll()"></div>
</div>

<div class="row">
<div class="field">Hb<input id="hb" inputmode="decimal" oninput="calcAll()"></div>
<div class="field">Alb<input id="alb" inputmode="decimal" oninput="calcAll()"></div>
</div>

<div class="field">Prime<input id="prime" inputmode="decimal" oninput="calcAll()"></div>

<div id="bsa" class="result">BSA : --</div>
<div id="hbDil" class="result">予想Hb : --</div>
<div id="dilution" class="result">希釈率 : --</div>
<div id="albDil" class="result">予想Alb : --</div>
</div>

<!-- Perfusion -->
<div id="clinical" class="section">

<h3 style="text-align:center;">CDI Data</h3>

<div class="cdi">
<div>Hb　<input id="hb_now" value="7.5" readonly onclick="select(this)"></div><br>
<div>SBE　<input id="sbe_now" value="-5" readonly onclick="select(this)"></div><br>
<div>SaO2　<input id="sao2_now" value="100" readonly onclick="select(this)"></div><br>
<div>CI　<input id="ci_now" value="2.4" readonly onclick="select(this)"></div>
</div>

<div class="control">
<button class="ctrl"
onmousedown="startPress(-0.1)"
onmouseup="stopPress()"
onmouseleave="stopPress()"
ontouchstart="startPress(-0.1)"
ontouchend="stopPress()">－</button>

<button class="ctrl"
onmousedown="startPress(0.1)"
onmouseup="stopPress()"
onmouseleave="stopPress()"
ontouchstart="startPress(0.1)"
ontouchend="stopPress()">＋</button>
</div>

<hr>

<h3 style="text-align:center;">Results</h3>
<div id="flow" class="result">Flow : --</div>
<div id="do2" class="result">DO2 : --</div>
<div id="do2i" class="result">DO2i : --</div>

<hr>

<h3 style="text-align:center;">Adjustments</h3>
<div style="text-align:center;">
目標Hb
<button onclick="adjust('target_hb',-0.5)">-0.5</button>
<input id="target_hb" value="9" readonly>
<button onclick="adjust('target_hb',0.5)">+0.5</button>
必要RBC <span id="rbc">--</span>
</div>

<div style="text-align:center;">
目標SBE
<button onclick="adjust('target_sbe',-1)">-1</button>
<input id="target_sbe" value="0" readonly>
<button onclick="adjust('target_sbe',1)">+1</button>
必要メイロン <span id="meylon">--</span>
</div>

</div>

<!-- CP -->
<div id="cp" class="section">

<label><input type="checkbox" id="valve" onchange="calcCP()">×1.5</label>

<h3>初回</h3>
投与量 <input id="v1" readonly>
K <input id="k1" inputmode="decimal" oninput="calcCP()">
<div id="kPred1">予測K : --</div>

<h3>持続</h3>
投与量 <input id="v2" readonly>
K <input id="k2" inputmode="decimal" oninput="calcCP()">
<div id="kPred2">予測K : --</div>

<h3>Hotshot</h3>
投与量 <input value="600" readonly>
K <input id="k3" inputmode="decimal" oninput="calcCP()">
<div id="kPred3">予測K : --</div>

<div id="totalK">総K投与量 : --</div>

</div>

<script>

function showTab(id,e){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
e.currentTarget.classList.add("active")
}

function calcAll(){
calcPre()
calcClinical()
calcCP()
}

function calcPre(){
let h=height.value,w=weight.value
if(h&&w){
let b=Math.sqrt((h*w)/3600)
bsa.innerHTML="BSA : "+b.toFixed(2)
}
}

function calcClinical(){
let h=height.value,w=weight.value
if(h&&w){
let b=Math.sqrt((h*w)/3600)
let f=ci_now.value*b
flow.innerHTML="Flow : "+f.toFixed(2)

let do2=1.34*hb_now.value*(sao2_now.value/100)*f*10/b
do2El=do2.toFixed(0)
document.getElementById("do2").innerHTML="DO2 : "+do2El
document.getElementById("do2i").innerHTML="DO2i : "+(do2/b).toFixed(0)
}
}

function calcCP(){
let w=weight.value||0
let valve=valveEl= document.getElementById("valve").checked?1.5:1

let init=800*valve
let cont=10*w*valve

v1.value=init
v2.value=cont
}

let selected=null,pressTimer,repeatTimer

function select(el){
selected=el
document.querySelectorAll(".cdi input").forEach(i=>i.classList.remove("selected"))
el.classList.add("selected")
}

function changeVal(d){
if(!selected)return
let v=parseFloat(selected.value)||0
selected.value=(v+d).toFixed(1)
calcAll()
}

function startPress(d){
changeVal(d)
pressTimer=setTimeout(()=>{
repeatTimer=setInterval(()=>changeVal(d),250)
},400)
}

function stopPress(){
clearTimeout(pressTimer)
clearInterval(repeatTimer)
}

function adjust(id,d){
let el=document.getElementById(id)
el.value=(parseFloat(el.value)+d).toFixed(1)
calcAll()
}

</script>

</body>
</html>
