<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CPB Tool</title>

<style>
body{font-family:-apple-system;background:#f2f2f7;padding:16px;}

.tabs{display:flex;gap:8px;margin-bottom:12px;}
.tab{flex:1;padding:10px;text-align:center;background:#ddd;border-radius:10px;}
.tab.active{background:#007aff;color:white;}

.section{display:none;}
.section.active{display:block;}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:10px;
}

.field{
display:flex;
justify-content:space-between;
align-items:center;
background:#fafafa;
padding:8px;
border-radius:10px;
}

input{
width:65px;
text-align:center;
font-size:16px;
border:none;
background:transparent;
}

/* CDI */
.cdi{
text-align:center;
margin-bottom:15px;
}

.cdi input{
background:#fafafa;
border-radius:8px;
padding:6px;
}

/* ★選択枠 */
.cdi input.selected{
outline:3px solid #007aff !important;
}

/* 操作 */
.control{
display:flex;
justify-content:center;
gap:40px;
margin:15px 0;
}

.ctrl{
font-size:24px;
padding:10px 20px;
background:#ddd;
border-radius:10px;
}

/* 結果 */
.result{
text-align:center;
font-size:18px;
margin:5px;
font-weight:bold;
}
</style>
</head>

<body>

<h2>CPB Tool</h2>

<div class="tabs">
<div class="tab active" onclick="showTab('basic',event)">Baseline</div>
<div class="tab" onclick="showTab('clinical',event)">Perfusion</div>
<div class="tab" onclick="showTab('cp',event)">CP</div>
</div>

<!-- ===== Baseline（変更なし） ===== -->
<div id="basic" class="section active">

<div class="row">
<div class="field">身長<input id="height" inputmode="decimal" oninput="calcAll()"></div>
<div class="field">体重<input id="weight" inputmode="decimal" oninput="calcAll()"></div>
</div>

<div class="row">
<div class="field">Hb<input id="hb" inputmode="decimal" oninput="calcAll()"></div>
<div class="field">Alb<input id="alb" inputmode="decimal" oninput="calcAll()"></div>
</div>

<div class="field">Prime<input id="prime" inputmode="decimal" oninput="calcAll()"></div>

<div id="bsa" class="result">BSA : --</div>
<div id="hbDil" class="result">予想Hb : --</div>
<div id="dilution" class="result">希釈率 : --</div>
<div id="albDil" class="result">予想Alb : --</div>

</div>

<!-- ===== Perfusion（修正済み） ===== -->
<div id="clinical" class="section">

<h3 style="text-align:center;">CDI Data</h3>

<div class="cdi">

<div>Hb　<input id="hb_now" value="7.5" readonly onclick="select(this)"></div>
<br>
<div>SBE　<input id="sbe_now" value="-5" readonly onclick="select(this)"></div>
<br>
<div>SaO2　<input id="sao2_now" value="100" readonly onclick="select(this)"></div>
<br>
<div>CI　<input id="ci_now" value="2.4" readonly onclick="select(this)"></div>

</div>

<div class="control">
<button class="ctrl"
onmousedown="startPress(-0.1)"
onmouseup="stopPress()"
onmouseleave="stopPress()"
ontouchstart="startPress(-0.1)"
ontouchend="stopPress()">－</button>

<button class="ctrl"
onmousedown="startPress(0.1)"
onmouseup="stopPress()"
onmouseleave="stopPress()"
ontouchstart="startPress(0.1)"
ontouchend="stopPress()">＋</button>
</div>

<hr>

<h3 style="text-align:center;">Results</h3>

<div id="flow" class="result">Flow : --</div>
<div id="do2" class="result">DO2 : --</div>
<div id="do2i" class="result">DO2i : --</div>

<hr>

<h3 style="text-align:center;">Adjustments</h3>

<div style="text-align:center;">
目標Hb
<button onclick="adjust('target_hb',-0.5)">-0.5</button>
<input id="target_hb" value="9" readonly>
<button onclick="adjust('target_hb',0.5)">+0.5</button>
必要RBC <span id="rbc">--</span>
</div>

<div style="text-align:center;">
目標SBE
<button onclick="adjust('target_sbe',-1)">-1</button>
<input id="target_sbe" value="0" readonly>
<button onclick="adjust('target_sbe',1)">+1</button>
必要メイロン <span id="meylon">--</span>
</div>

</div>

<!-- ===== CP（完全そのまま） ===== -->
<div id="cp" class="section">
※ここはあなたの元コードそのまま貼ってください
</div>

<script>

// タブ
function showTab(id,e){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
e.currentTarget.classList.add("active")
}

// 計算
function calcAll(){
calcPre()
calcClinical()
calcCP && calcCP()
}

// Baseline
function calcPre(){
let h=parseFloat(height.value)||0
let w=parseFloat(weight.value)||0
let hb=parseFloat(document.getElementById("hb").value)||0
let alb=parseFloat(document.getElementById("alb").value)||0
let prime=parseFloat(document.getElementById("prime").value)||0

if(h&&w){
let b=Math.sqrt((h*w)/3600)
bsa.innerHTML="BSA : "+b.toFixed(2)

let blood=w*70
if(hb) hbDil.innerHTML="予想Hb : "+(hb*blood/(blood+prime)).toFixed(2)
if(alb) albDil.innerHTML="予想Alb : "+(alb*blood/(blood+prime)).toFixed(2)

dilution.innerHTML="希釈率 : "+((blood+prime)/blood).toFixed(2)
}
}

// Perfusion
function calcClinical(){
let h=parseFloat(height.value)||0
let w=parseFloat(weight.value)||0
let hb=parseFloat(hb_now.value)||0
let sao2=(parseFloat(sao2_now.value)||0)/100
let ci=parseFloat(ci_now.value)||0
let sbe=parseFloat(sbe_now.value)||0

let targetHb=parseFloat(target_hb.value)||0
let targetSBE=parseFloat(target_sbe.value)||0

if(h&&w){
let b=Math.sqrt((h*w)/3600)

let flow=ci*b
document.getElementById("flow").innerHTML="Flow : "+flow.toFixed(2)

let do2=1.34*hb*sao2*flow*10/b
document.getElementById("do2").innerHTML="DO2 : "+do2.toFixed(0)
document.getElementById("do2i").innerHTML="DO2i : "+(do2/b).toFixed(0)

let r=targetHb-hb
if(r<0)r=0
document.getElementById("rbc").innerText=r.toFixed(1)

let m=0.36*w*(targetSBE-sbe)
if(m<0)m=0
document.getElementById("meylon").innerText=m.toFixed(0)
}
}

// ===== 選択＋長押し（完成版） =====
let selected = null
let pressTimer = null
let repeatTimer = null

function select(el){
selected = el
document.querySelectorAll(".cdi input").forEach(i=>i.classList.remove("selected"))
el.classList.add("selected")
}

function changeVal(delta){
if(!selected) return
let v=parseFloat(selected.value)||0
v+=delta
selected.value=v.toFixed(1)
calcAll()
}

function startPress(delta){
if(!selected) return

changeVal(delta)

pressTimer=setTimeout(()=>{
repeatTimer=setInterval(()=>{
changeVal(delta)
},250)
},400)
}

function stopPress(){
clearTimeout(pressTimer)
clearInterval(repeatTimer)
}

// 調整
function adjust(id,delta){
let el=document.getElementById(id)
let v=parseFloat(el.value)||0
v+=delta
el.value=v.toFixed(1)
calcAll()
}

</script>

</body>
</html>
